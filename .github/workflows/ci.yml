name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile all Python files
        run: |
          find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python -m py_compile

      - name: Run tests
        run: pytest -q

      - name: Validate plugin.yaml schema
        run: |
          python - <<'PY'
          import re, sys, yaml
          with open("plugin.yaml") as f:
              data = yaml.safe_load(f)
          errors = []
          required = ["name", "title", "description", "version"]
          for k in required:
              if not data.get(k):
                  errors.append(f"missing required field: {k}")
          if not re.match(r"^[a-z0-9_]+$", str(data.get("name", ""))):
              errors.append(f"invalid name {data.get('name')!r}: must match ^[a-z0-9_]+$")
          allowed_sections = {"agent", "external", "developer", "ui", "advanced"}
          for s in data.get("settings_sections", []) or []:
              if s not in allowed_sections:
                  errors.append(f"unknown settings_section: {s}")
          if errors:
              for e in errors:
                  print(f"::error::{e}")
              sys.exit(1)
          print("plugin.yaml valid")
          PY
