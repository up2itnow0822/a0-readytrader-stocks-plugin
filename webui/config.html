<html>
<head>
  <title>ReadyTrader Stocks Settings</title>
  <script type="module">
    import { store } from "/components/plugins/plugin-settings-store.js";
  </script>
  <style>
    .rt-heading        { margin-bottom: 12px; color: #e2e8f0; }
    .rt-heading--spaced{ margin: 20px 0 12px; color: #e2e8f0; }
    .rt-field          { margin-bottom: 16px; }
    .rt-label          { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 13px; }
    .rt-input          { width: 100%; padding: 8px 12px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; }
    .rt-hint           { font-size: 11px; color: #64748b; }
  </style>
</head>
<body>
  <div x-data>
    <template x-if="$store.pluginSettings">
      <div>
        <h3 class="rt-heading">📈 ReadyTrader Stocks</h3>

        <div class="rt-field">
          <label class="rt-label">MCP Server URL</label>
          <input type="text" class="rt-input"
                 x-model="$store.pluginSettings.settings.mcp_server_url"
                 placeholder="http://localhost:8000" />
        </div>

        <div class="rt-field">
          <label class="rt-label">MCP Request Timeout (seconds)</label>
          <input type="number" class="rt-input"
                 x-model.number="$store.pluginSettings.settings.mcp_request_timeout"
                 min="1" max="300" step="1" />
        </div>

        <div class="rt-field">
          <label class="rt-label">Trading Mode</label>
          <select class="rt-input" x-model="$store.pluginSettings.settings.trading_mode">
            <option value="paper">Paper (Simulated)</option>
            <option value="live">Live</option>
          </select>
        </div>

        <h3 class="rt-heading--spaced">⚠️ Risk Limits</h3>

        <div class="rt-field">
          <label class="rt-label">Max Position Size (USD)</label>
          <input type="number" class="rt-input"
                 x-model.number="$store.pluginSettings.settings.max_position_size_usd"
                 min="0" step="100" />
        </div>

        <div class="rt-field">
          <label class="rt-label">Max Portfolio Risk (%)</label>
          <input type="number" class="rt-input"
                 x-model.number="$store.pluginSettings.settings.max_portfolio_risk_pct"
                 min="0" max="100" step="0.5" />
        </div>

        <div class="rt-field">
          <label class="rt-label">Stop Loss (%)</label>
          <input type="number" class="rt-input"
                 x-model.number="$store.pluginSettings.settings.stop_loss_pct"
                 min="0" max="50" step="0.5" />
        </div>

        <h3 class="rt-heading--spaced">🔑 Brokerage API</h3>
        <div class="rt-field">
          <label class="rt-label">API Key Env Var</label>
          <input type="text" class="rt-input"
                 x-model="$store.pluginSettings.settings.brokerage_api_key_env"
                 placeholder="ALPACA_API_KEY" />
          <span class="rt-hint">Name of the env var holding your brokerage API key.</span>
        </div>
      </div>
    </template>
  </div>
</body>
</html>
